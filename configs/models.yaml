  # Upgrade path models (paid, for when budget allows)
  premium:
    - id: "openai/gpt-4o"
      name: "GPT-4o"
      context_length: 128000
      modalities: ["text", "image"]
      best_for: ["complex_reasoning", "multimodal"]

    - id: "anthropic/claude-sonnet-4"
      name: "Claude Sonnet 4"
      context_length: 200000
      modalities: ["text", "image"]
      best_for: ["complex_reasoning", "code_generation"]

    - id: "anthropic/claude-3.5-sonnet"
      name: "Claude 3.5 Sonnet"
      context_length: 200000
      modalities: ["text", "image"]
      best_for: ["code_generation", "analysis"]

# Default fallback model
default_model: "meta-llama/llama-3.3-70b-instruct:free"
default_fast_model: "openai/gpt-oss-20b:free"
default_multimodal_model: "google/gemma-4-26b-a4b-it:free"
