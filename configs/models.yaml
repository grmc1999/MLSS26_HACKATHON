    - id: "google/gemma-4-31b-it:free"
      name: "Gemma 4 31B Multimodal"
      context_length: 262144
      modalities: ["text", "image", "video"]
      best_for: ["forecasting", "time_series_architectures", "model_design"]

    - id: "nvidia/nemotron-nano-12b-v2-vl:free"
      name: "Nemotron Nano 12B VL"
      context_length: 128000
      modalities: ["text", "image", "video"]
      best_for: ["epidemiological_analysis", "seasonal_patterns", "covariate_analysis"]

    - id: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free"
      name: "Nemotron 3 Nano Omni"
      context_length: 256000
      modalities: ["text", "image", "audio", "video"]
      best_for: ["multimodal_reasoning", "continual_learning"]

    - id: "nvidia/nemotron-3-nano-30b-a3b:free"
      name: "Nemotron 3 Nano 30B"
      context_length: 256000
