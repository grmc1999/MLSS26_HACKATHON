# OpenRouter Model Configuration
# All models route through https://openrouter.ai/api/v1/chat/completions
# Free models have pricing of $0 for both prompt and completion

openrouter:
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"

# Model tiers - agents are routed to models based on task difficulty
tiers:
  free:
    # General purpose models (text only)
    - id: "meta-llama/llama-3.3-70b-instruct:free"
      name: "Llama 3.3 70B"
      context_length: 131072
      modalities: ["text"]
      best_for: ["general_reasoning", "planning", "experimentation"]

    - id: "nvidia/nemotron-3-ultra-550b-a55b:free"
      name: "Nemotron 3 Ultra 550B"
      context_length: 1000000
      modalities: ["text"]
      best_for: ["complex_reasoning", "long_context", "research_planning"]

    - id: "nvidia/nemotron-3-super-120b-a12b:free"
      name: "Nemotron 3 Super 120B"
      context_length: 1000000
      modalities: ["text"]
      best_for: ["physics_modeling", "mathematics", "analysis"]

    - id: "qwen/qwen3-coder:free"
      name: "Qwen3 Coder 480B"
      context_length: 1048576
      modalities: ["text"]
      best_for: ["code_generation", "script_editing", "literature_search"]

    - id: "qwen/qwen3-next-80b-a3b-instruct:free"
      name: "Qwen3 Next 80B"
      context_length: 262144
      modalities: ["text"]
      best_for: ["prompt_engineering", "agent_coordination"]

    - id: "nousresearch/hermes-3-llama-3.1-405b:free"
      name: "Hermes 3 405B"
      context_length: 131072
      modalities: ["text"]
      best_for: ["deep_learning", "training_loops", "loss_functions"]

    - id: "openai/gpt-oss-120b:free"
      name: "GPT-OSS 120B"
      context_length: 131072
      modalities: ["text"]
      best_for: ["general_reasoning", "evaluation"]

    - id: "openai/gpt-oss-20b:free"
      name: "GPT-OSS 20B"
      context_length: 131072
      modalities: ["text"]
      best_for: ["fast_summarization", "lightweight_tasks"]

    - id: "cohere/north-mini-code:free"
      name: "Cohere North Mini Code"
      context_length: 256000
      modalities: ["text"]
      best_for: ["code_editing", "script_modification"]

    # Multimodal models (text + image + video)
    - id: "google/gemma-4-26b-a4b-it:free"
      name: "Gemma 4 26B Multimodal"
      context_length: 262144
      modalities: ["text", "image", "video"]
