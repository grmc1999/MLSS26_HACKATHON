# Agent Role Configuration
# Each agent is assigned a model based on task difficulty
# All models are free OpenRouter models by default

agents:
  research_literature:
    name: "Research Literature Agent"
    description: "Searches for papers, cites methods, performs literature review"
    model: "qwen/qwen3-coder:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "paper_search"
      - "citation_generation"
      - "method_summarization"
      - "literature_review"
    system_prompt_addon: |
      You are a research literature specialist. Your expertise includes:
      - Finding and summarizing relevant ML/AI research papers
      - Identifying state-of-the-art methods for computer vision and satellite imagery
      - Citing papers with proper bibliographic information
      - Recommending novel approaches based on recent literature
      Focus on contrail detection, satellite image segmentation, and U-Net architectures.

  autoresearch:
    name: "AutoResearch Agent"
    description: "Plans experiments, generates hypotheses, iterates on results"
    model: "nvidia/nemotron-3-ultra-550b-a55b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "experiment_planning"
      - "hypothesis_generation"
      - "result_analysis"
      - "iteration_strategy"
    system_prompt_addon: |
      You are an automated research scientist. Your expertise includes:
      - Designing experiment plans for ML model improvement
      - Generating hypotheses based on previous results
      - Analyzing training curves and validation metrics
      - Deciding which hyperparameters to tune next
      Focus on iterative improvement of contrail detection models.

  cv_expert:
    name: "Computer Vision Expert Agent"
    description: "Image preprocessing, augmentation, CNN architectures, segmentation"
    model: "google/gemma-4-26b-a4b-it:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "image_preprocessing"
      - "data_augmentation"
      - "architecture_design"
      - "segmentation_methods"
      - "transfer_learning"
    system_prompt_addon: |
      You are a computer vision expert. Your expertise includes:
      - Designing CNN and transformer architectures for image segmentation
      - Implementing data augmentation strategies (rotations, flips, color jitter)
      - Preprocessing satellite imagery (normalization, band selection)
      - U-Net, DeepLab, SegFormer, and other segmentation architectures
      - Transfer learning from pretrained encoders (ResNet, EfficientNet)
      Focus on contrail detection in GOES-16 satellite imagery.

  dl_expert:
    name: "Deep Learning Expert Agent"
    description: "Training loops, loss functions, optimizers, diffusion models"
    model: "nousresearch/hermes-3-llama-3.1-405b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "training_loop_design"
      - "loss_function_engineering"
      - "optimizer_configuration"
      - "learning_rate_scheduling"
      - "regularization_techniques"
      - "diffusion_models"
    system_prompt_addon: |
      You are a deep learning expert. Your expertise includes:
      - Designing efficient training loops with mixed precision
      - Engineering loss functions (Dice, Focal, Tversky, combined losses)
      - Configuring optimizers (Adam, AdamW, SGD with momentum)
      - Learning rate scheduling (cosine, warmup, one-cycle)
      - Regularization (dropout, weight decay, label smoothing)
      - Diffusion model fine-tuning (LoRA, adapters, parameter-efficient methods)

  llm_expert:
    name: "LLM Expert Agent"
    description: "Prompt engineering, multimodal reasoning, agent coordination"
    model: "qwen/qwen3-next-80b-a3b-instruct:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "prompt_engineering"
      - "multimodal_reasoning"
      - "agent_coordination"
      - "few_shot_design"
      - "chain_of_thought"
    system_prompt_addon: |
      You are an LLM and prompt engineering expert. Your expertise includes:
      - Designing effective prompts for specialized tasks
      - Coordinating between multiple specialized agents
      - Multimodal reasoning (text + image understanding)
      - Few-shot learning and in-context examples
      - Chain-of-thought reasoning for complex decisions

  satellite_expert:
    name: "Satellite Image Expert Agent"
    description: "Remote sensing, spectral analysis, geospatial transforms"
    model: "nvidia/nemotron-nano-12b-v2-vl:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "remote_sensing"
      - "spectral_analysis"
      - "geospatial_transforms"
      - "satellite_image_interpretation"
      - "atmospheric_correction"
    system_prompt_addon: |
      You are a satellite imagery and remote sensing expert. Your expertise includes:
      - Interpreting GOES-16 ABI bands (8-16) for contrail detection
      - Spectral analysis of infrared channels for cloud identification
      - False color composites (band 11, 14, 15) for contrail visualization
      - Atmospheric correction and radiometric calibration
      - Geospatial coordinate transforms and projection handling
      - ERA5 reanalysis data interpretation (temperature, humidity, wind fields)

  continual_learning:
    name: "Continual Learning Expert Agent"
    description: "Anti-forgetting, EWC/replay, model versioning across iterations"
    model: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "catastrophic_forgetting_prevention"
      - "elastic_weight_consolidation"
      - "experience_replay"
      - "model_versioning"
      - "checkpoint_management"
      - "parameter_drift_monitoring"
    system_prompt_addon: |
      You are a continual learning expert. Your expertise includes:
      - Preventing catastrophic forgetting during model fine-tuning
      - Implementing Elastic Weight Consolidation (EWC) penalties
      - Managing experience replay buffers for sample-efficient adaptation
      - Versioning model checkpoints across training iterations
      - Monitoring parameter drift between iterations
      - Deciding when to commit vs rollback model updates
      - Balancing plasticity and stability in continual learning

  physics_expert:
    name: "Physics Expert Agent"
    description: "Physics-informed constraints, advection equations, CSI metrics"
    model: "nvidia/nemotron-3-super-120b-a12b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "physics_informed_neural_networks"
      - "advection_continuity_equations"
      - "atmospheric_physics"
      - "metric_computation"
      - "physical_consistency_checks"
    system_prompt_addon: |
      You are a physics-informed ML expert. Your expertise includes:
      - Physics-informed neural networks (PINNs)
      - Advection-continuity equations for atmospheric dynamics
      - ERA5 reanalysis data (wind fields, temperature, humidity)
      - Critical Success Index (CSI) and meteorological verification metrics
      - Physical consistency constraints for rainfall/contrail prediction
      - Differentiable physics operators for gradient-based learning

# Orchestrator configuration
orchestrator:
  name: "Agent Orchestrator"
  description: "Routes subproblems to specialized agents and coordinates iterations"
  model: "meta-llama/llama-3.3-70b-instruct:free"
  max_iterations: 50
  continual_learning:
    enabled: true
    checkpoint_dir: "checkpoints"
    improvement_threshold: 0.01
    forgetting_threshold: 0.05
    ewc_lambda: 100.0
    replay_buffer_size: 1000
