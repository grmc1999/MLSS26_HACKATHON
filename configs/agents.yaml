# Agent Role Configuration
# Each agent is assigned a model based on task difficulty
# All models are free OpenRouter models by default

agents:
  research_literature:
    name: "Research Literature Agent"
    description: "Searches for papers, cites methods, performs literature review"
    model: "qwen/qwen3-coder:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "paper_search"
      - "citation_generation"
      - "method_summarization"
      - "literature_review"
    system_prompt_addon: |
      You are a research literature specialist for physics-consistent dynamical systems forecasting.
      Focus: conditional diffusion models, adjoint-matched fine-tuning, SIR/SEIR models,
      RESPNET/ILINET epidemiological data, parameter-efficient fine-tuning (LoRA/adapters).

  autoresearch:
    name: "AutoResearch Agent"
    description: "Plans experiments, generates hypotheses, iterates on results"
    model: "nvidia/nemotron-3-ultra-550b-a55b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "experiment_planning"
      - "hypothesis_generation"
      - "result_analysis"
      - "iteration_strategy"
    system_prompt_addon: |
      You are an autonomous research scientist running adjoint-matched diffusion fine-tuning
      for flu forecasting. Core method: conditional diffusion + SIR physical prior + adjoint
      matching loss + LoRA PEFT. Stages: benchmark → fast → ablation → medium → expensive.
      Focus on minimizing MAE for 10-step-ahead RESPNET/ILINET forecasting.

  cv_expert:
    name: "Dynamical Systems Expert Agent"
    description: "Diffusion models, time series architectures, Neural ODE, sequence modeling"
    model: "google/gemma-4-26b-a4b-it:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "sequence_modeling"
      - "architecture_design"
      - "temporal_pattern_extraction"
      - "forecasting_methods"
      - "transfer_learning"
    system_prompt_addon: |
      You are a dynamical systems and time series expert. Architectures: Seq2Seq LSTM, TCN,
      Transformer, Neural ODE, conditional diffusion. Input: 5 epiweeks → Output: 10 epiweeks.
      Physical priors: SIR/SEIR compartmental models, SIR-net corrections.
      Seasonality: Fourier features for epiweeks. Covariates: temperature, vaccination, mobility.

  dl_expert:
    name: "Deep Learning Expert Agent"
    description: "Diffusion training, LoRA, adjoint loss, training optimization"
    model: "nousresearch/hermes-3-llama-3.1-405b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "training_loop_design"
      - "loss_function_engineering"
      - "optimizer_configuration"
      - "learning_rate_scheduling"
      - "regularization_techniques"
    system_prompt_addon: |
      You are a deep learning expert. Focus: diffusion model training (noise schedule,
      DDPM/DDIM), adjoint matching loss (torch.autograd.grad), LoRA PEFT (low-rank
      adaptation), mixed precision, gradient clipping, cosine annealing.

  llm_expert:
    name: "LLM Expert Agent"
    description: "Prompt engineering, reasoning, agent coordination"
    model: "qwen/qwen3-next-80b-a3b-instruct:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "prompt_engineering"
      - "reasoning"
      - "agent_coordination"
      - "few_shot_design"
      - "chain_of_thought"
    system_prompt_addon: |
      You are an LLM and prompt engineering expert. Coordinate specialized agents for
      adjoint-matched diffusion fine-tuning. Route subproblems to the right expert,
      synthesize advice, handle conflicting recommendations.

  satellite_expert:
    name: "Spatiotemporal Expert Agent"
    description: "Epidemiological modeling, SIR/SEIR, RESPNET/ILINET, seasonal patterns"
    model: "nvidia/nemotron-nano-12b-v2-vl:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "epidemiological_modeling"
      - "seasonal_pattern_analysis"
      - "health_data_interpretation"
      - "RESPNET-ILINET_processing"
      - "external_covariate_integration"
    system_prompt_addon: |
      You are an epidemiological data expert. Specialize in RESPNET/ILINET surveillance,
      SIR/SEIR compartmental models, seasonal epiweek patterns, CDC FluSight baselines,
      physical residuals for flu (SIR dynamics), peak timing/magnitude evaluation,
      multi-region HHS data. ERA5 climate covariates.

  continual_learning:
    name: "Continual Learning Expert Agent"
    description: "EWC, replay, checkpoint versioning across iterations"
    model: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "catastrophic_forgetting_prevention"
      - "elastic_weight_consolidation"
      - "experience_replay"
      - "model_versioning"
      - "checkpoint_management"
      - "parameter_drift_monitoring"
    system_prompt_addon: |
      You are a continual learning expert. Apply EWC to prevent forgetting across
      fine-tuning stages (fast→medium→expensive). Decision: commit if improvement
      >= 0.01 AND forgetting < 0.05. Replay buffer of exemplar flu seasons.

  physics_expert:
    name: "Physics Expert Agent"
    description: "Adjoint matching, Neural ODE, SIR/SEIR, physical constraints, PINNs"
    model: "nvidia/nemotron-3-super-120b-a12b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "dynamical_systems_modeling"
      - "compartmental_models"
      - "SIR_SEIR_equations"
      - "metric_computation"
      - "physical_consistency_checks"
    system_prompt_addon: |
      You are a physics-informed ML expert. Core methods: adjoint matching (align diffusion
      updates with SIR physical gradients), Neural ODE via torchdiffeq, SEIR compartmental
      models, SIR-net corrections, physical residuals (positivity, conservation, smoothness),
      R0 estimation. Adjoint loss: L_AM = ||Delta_theta + eta * g_adj||^2 where
      g_adj = grad_x ||SIR(hat_x0) - hat_x0_next||^2.

# Orchestrator configuration
orchestrator:
  name: "Agent Orchestrator"
  description: "Routes subproblems to specialized agents and coordinates iterations"
  model: "meta-llama/llama-3.3-70b-instruct:free"
  max_iterations: 50
  continual_learning:
    enabled: true
    checkpoint_dir: "checkpoints"
    improvement_threshold: 0.01
    forgetting_threshold: 0.05
    ewc_lambda: 100.0
    replay_buffer_size: 1000
