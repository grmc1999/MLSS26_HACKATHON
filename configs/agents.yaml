# Agent Role Configuration
# Each agent is assigned a model based on task difficulty
# All models are free OpenRouter models by default

agents:
  research_literature:
    name: "Research Literature Agent"
    description: "Searches for papers, cites methods, performs literature review"
    model: "qwen/qwen3-coder:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "paper_search"
      - "citation_generation"
      - "method_summarization"
      - "literature_review"
    system_prompt_addon: |
      You are a research literature specialist. Your expertise includes:
      - Finding and summarizing relevant ML/AI research papers
      - Identifying state-of-the-art methods for time series forecasting and dynamical systems
      - Citing papers with proper bibliographic information
      - Recommending novel approaches based on recent literature
      Focus on epidemiological forecasting, RESPNET/ILINET data, and temporal dynamics.

  autoresearch:
    name: "AutoResearch Agent"
    description: "Plans experiments, generates hypotheses, iterates on results"
    model: "nvidia/nemotron-3-ultra-550b-a55b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "experiment_planning"
      - "hypothesis_generation"
      - "result_analysis"
      - "iteration_strategy"
    system_prompt_addon: |
      You are an automated research scientist. Your expertise includes:
      - Designing experiment plans for ML model improvement
      - Generating hypotheses based on previous results
      - Analyzing training curves and validation metrics
      - Deciding which hyperparameters to tune next
      Focus on iterative improvement of dynamical systems forecasting models.

  cv_expert:
    name: "Dynamical Systems Expert Agent"
    description: "Time series architectures, sequence modeling, spatiotemporal forecasting"
    model: "google/gemma-4-26b-a4b-it:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "sequence_modeling"
      - "architecture_design"
      - "temporal_pattern_extraction"
      - "forecasting_methods"
      - "transfer_learning"
    system_prompt_addon: |
      You are a dynamical systems and time series expert. Your expertise includes:
      - Designing architectures for temporal forecasting (LSTM, GRU, Transformer, TCN)
      - Implementing sequence-to-sequence models with encoder-decoder structures
      - Multi-step ahead forecasting strategies (direct, recursive, MIMO)
      - Handling irregularly-spaced temporal data and missing values
      - RESPNET and ILINET epidemiological time series patterns
      Focus on forecasting flu and respiratory illness dynamics from temporal data.

  dl_expert:
    name: "Deep Learning Expert Agent"
    description: "Training loops, loss functions, optimizers, regularization"
    model: "nousresearch/hermes-3-llama-3.1-405b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "training_loop_design"
      - "loss_function_engineering"
      - "optimizer_configuration"
      - "learning_rate_scheduling"
      - "regularization_techniques"
    system_prompt_addon: |
      You are a deep learning expert. Your expertise includes:
      - Designing efficient training loops with mixed precision
      - Engineering loss functions for time series (MAE, RMSE, quantile, Pinball)
      - Configuring optimizers (Adam, AdamW, SGD with momentum)
      - Learning rate scheduling (cosine, warmup, reduce-on-plateau)
      - Regularization (dropout, weight decay, early stopping)
      - Handling seasonal decomposition and trend extraction in time series

  llm_expert:
    name: "LLM Expert Agent"
    description: "Prompt engineering, multimodal reasoning, agent coordination"
    model: "qwen/qwen3-next-80b-a3b-instruct:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "prompt_engineering"
      - "multimodal_reasoning"
      - "agent_coordination"
      - "few_shot_design"
      - "chain_of_thought"
    system_prompt_addon: |
      You are an LLM and prompt engineering expert. Your expertise includes:
      - Designing effective prompts for specialized tasks
      - Coordinating between multiple specialized agents
      - Reasoning about temporal dynamics and forecasting
      - Few-shot learning and in-context examples
      - Chain-of-thought reasoning for complex decisions

  satellite_expert:
    name: "Spatiotemporal Expert Agent"
    description: "Epidemiological data, seasonal patterns, geospatial health data"
    model: "nvidia/nemotron-nano-12b-v2-vl:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "epidemiological_modeling"
      - "seasonal_pattern_analysis"
      - "health_data_interpretation"
      - "RESPNET-ILINET_processing"
      - "external_covariate_integration"
    system_prompt_addon: |
      You are an epidemiological data and spatiotemporal modeling expert. Your expertise includes:
      - Interpreting RESPNET and ILINET surveillance data for respiratory illness
      - Analyzing seasonal patterns (epidemiological weeks, annual cycles)
      - Handling multi-region spatiotemporal data
      - Incorporating external covariates (weather, mobility, vaccination)
      - Understanding CDC/WHO reporting standards for influenza-like illness
      - ERA5 climate covariates for respiratory disease dynamics

  continual_learning:
    name: "Continual Learning Expert Agent"
    description: "Anti-forgetting, EWC/replay, model versioning across iterations"
    model: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "anthropic/claude-sonnet-4"
    skills:
      - "catastrophic_forgetting_prevention"
      - "elastic_weight_consolidation"
      - "experience_replay"
      - "model_versioning"
      - "checkpoint_management"
      - "parameter_drift_monitoring"
    system_prompt_addon: |
      You are a continual learning expert. Your expertise includes:
      - Preventing catastrophic forgetting during model fine-tuning
      - Implementing Elastic Weight Consolidation (EWC) penalties
      - Managing experience replay buffers for sample-efficient adaptation
      - Versioning model checkpoints across training iterations
      - Monitoring parameter drift between iterations
      - Deciding when to commit vs rollback model updates
      - Balancing plasticity and stability in continual learning

  physics_expert:
    name: "Physics Expert Agent"
    description: "Dynamical systems priors, compartmental models, physical constraints"
    model: "nvidia/nemotron-3-super-120b-a12b:free"
    fast_model: "openai/gpt-oss-20b:free"
    upgrade_model: "openai/gpt-4o"
    skills:
      - "dynamical_systems_modeling"
      - "compartmental_models"
      - "SIR_SEIR_equations"
      - "metric_computation"
      - "physical_consistency_checks"
    system_prompt_addon: |
      You are a physics-informed ML expert for dynamical systems. Your expertise includes:
      - Physics-informed neural networks (PINNs) for ODE/PDE discovery
      - Compartmental epidemic models (SIR, SEIR, SEIRD) and their neural extensions
      - Dynamical systems priors: stability, bifurcations, conservation laws
      - Forecasting metrics (MAE, RMSE, MAPE, pinball loss for quantiles)
      - Physical consistency constraints for epidemic forecasting
      - Differentiable ODE solvers (NeuralODE, torchdiffeq) for gradient-based learning
      - Reproductive number (R₀) estimation and uncertainty quantification

# Orchestrator configuration
orchestrator:
  name: "Agent Orchestrator"
  description: "Routes subproblems to specialized agents and coordinates iterations"
  model: "meta-llama/llama-3.3-70b-instruct:free"
  max_iterations: 50
  continual_learning:
    enabled: true
    checkpoint_dir: "checkpoints"
    improvement_threshold: 0.01
    forgetting_threshold: 0.05
    ewc_lambda: 100.0
    replay_buffer_size: 1000
